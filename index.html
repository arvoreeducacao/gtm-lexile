<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Restricted</title>
<style>
  :root{ --bg:#0f1410; --card:#161d17; --ink:#e8efe6; --mut:#8aa089; --accent:#3f6b3a; --line:#27331f; }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:var(--bg);color:var(--ink);display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);border-radius:16px;
        padding:34px 30px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
  .mark{width:40px;height:40px;border-radius:10px;background:var(--accent);display:flex;align-items:center;
        justify-content:center;font-weight:700;color:#fff;font-size:20px;margin-bottom:18px}
  h1{font-size:18px;margin:0 0 4px}
  p{font-size:13px;color:var(--mut);margin:0 0 22px;line-height:1.5}
  label{display:block;font-size:12px;color:var(--mut);margin-bottom:7px}
  input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:#0e130d;
        color:var(--ink);font-size:15px;outline:none}
  input:focus{border-color:var(--accent)}
  button{width:100%;margin-top:14px;padding:12px;border:0;border-radius:10px;background:var(--accent);
         color:#fff;font-size:15px;font-weight:600;cursor:pointer}
  button:disabled{opacity:.6;cursor:default}
  .err{color:#e07a6b;font-size:12.5px;margin-top:12px;min-height:16px}
</style>
</head>

async function unlock(pw){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(DATA.salt),iterations:250000,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(DATA.iv)},key,b64(DATA.ct));
  return new TextDecoder().decode(pt);
}
const f=document.getElementById("f"),e=document.getElementById("e"),b=document.getElementById("b");
f.addEventListener("submit",async ev=>{
  ev.preventDefault(); e.textContent=""; b.disabled=true; b.textContent="Unlocking...";
  try{
    const html=await unlock(document.getElementById("pw").value);
    document.open(); document.write(html); document.close();
  }catch(err){
    e.textContent="Incorrect password."; b.disabled=false; b.textContent="Unlock";
    document.getElementById("pw").value=""; document.getElementById("pw").focus();
  }
});
